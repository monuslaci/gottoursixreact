services:
  postgres:
    image: postgres:16-alpine
    container_name: gottoursix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gottoursix
    ports:
      - "5432:5432"
    volumes:
      - gottoursix_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gottoursix"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gottoursix_pgdata:
